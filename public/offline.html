<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#593D31" />
    <title>Dulces Momentos — Sin Conexión</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #f3efe0;
        color: #593d31;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      .container {
        text-align: center;
        max-width: 400px;
      }
      .icon {
        width: 80px;
        height: 80px;
        margin: 0 auto 1.5rem;
        background: #e8bc6e;
        border-radius: 1.25rem;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .icon svg {
        width: 40px;
        height: 40px;
        color: white;
      }
      h1 {
        font-size: 1.75rem;
        font-weight: 800;
        margin-bottom: 0.75rem;
        color: #2d2d2d;
      }
      p {
        font-size: 1rem;
        color: #6b5b4f;
        line-height: 1.6;
        margin-bottom: 2rem;
      }
      button {
        background: #e8bc6e;
        color: white;
        border: none;
        padding: 0.875rem 2rem;
        border-radius: 0.75rem;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #dca34b;
      }
      button:active {
        transform: scale(0.97);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M18.364 5.636a9 9 0 11-12.728 0M12 9v4m0 4h.01"
          />
        </svg>
      </div>
      <h1>Sin Conexión</h1>
      <p>
        No se pudo conectar al servidor. Verifica tu conexión a internet e
        intenta de nuevo.
      </p>
      <button onclick="window.location.reload()">Reintentar</button>
    </div>
  </body>
</html>
